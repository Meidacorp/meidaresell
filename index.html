function useInView(ref) {
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold: 0.1 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return inView;
}

function AnimCard({ children, delay = 0 }) {
  const ref = useRef(null);
  const inView = useInView(ref);
  return (
    <div ref={ref} style={{
      opacity: inView ? 1 : 0,
      transform: inView ? "translateY(0)" : "translateY(30px)",
      transition: `opacity 0.55s ease ${delay}s, transform 0.55s ease ${delay}s`,
    }}>
      {children}
    </div>
  );
}

              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 14, lineHeight: 1.4 }}>Prénom + âge <span style={{ color: PINK }}>*</span></div>
              <input value={prenomAge} onChange={e => setPrenomAge(e.target.value)} placeholder="Ex : Théo, 24 ans" style={{ width: "100%", background: "#161616", border: "1px solid #2a2a2a", color: "#fff", fontSize: 16, padding: "15px 16px", borderRadius: 10, marginBottom: 20, fontFamily: "inherit" }} />
              <button onClick={() => prenomAge.trim().length >= 2 && nextStep()} disabled={prenomAge.trim().length < 2} style={{ width: "100%", background: `linear-gradient(135deg, ${PINK}, #8A0048)`, color: "#fff", border: "none", padding: "16px", fontSize: 15, fontWeight: 700, borderRadius: 10, fontFamily: "inherit", cursor: prenomAge.trim().length >= 2 ? "pointer" : "not-allowed", opacity: prenomAge.trim().length >= 2 ? 1 : 0.35 }}>Continuer →</button>
            </div>
          )}

          {step === 2 && (
            <div>
              <button onClick={prevStep} style={{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", marginBottom: 14, padding: 0, fontFamily: "inherit" }}>← Retour</button>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 14, lineHeight: 1.4 }}>Ton numéro de téléphone <span style={{ color: PINK }}>*</span></div>
              <input type="tel" inputMode="tel" value={telephone} onChange={e => setTelephone(e.target.value)} placeholder="06 12 34 56 78" style={{ width: "100%", background: "#161616", border: "1px solid #2a2a2a", color: "#fff", fontSize: 16, padding: "15px 16px", borderRadius: 10, marginBottom: 20, fontFamily: "inherit", marginBottom: 10 }} />
              <p style={{ fontSize: 12.5, color: "#666", lineHeight: 1.5, marginBottom: 18 }}>Pour que je puisse te recontacter directement.</p>
              <button onClick={() => telOk && nextStep()} disabled={!telOk} style={{ width: "100%", background: `linear-gradient(135deg, ${PINK}, #8A0048)`, color: "#fff", border: "none", padding: "16px", fontSize: 15, fontWeight: 700, borderRadius: 10, fontFamily: "inherit", cursor: telOk ? "pointer" : "not-allowed", opacity: telOk ? 1 : 0.35 }}>Continuer →</button>
            </div>
          )}

          {step === 3 && (
            <div>
              <button onClick={prevStep} style={{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", marginBottom: 14, padding: 0, fontFamily: "inherit" }}>← Retour</button>
              <div style={{ background: "#161616", borderLeft: `3px solid ${PINK}`, padding: "14px 16px", borderRadius: 4, marginBottom: 20 }}>
                <div style={{ color: PINK, fontWeight: 800, fontSize: 12, letterSpacing: "1.5px", marginBottom: 6 }}>IMPORTANT</div>
                <p style={{ margin: 0, fontSize: 13.5, color: "#d8d8d8", lineHeight: 1.5 }}>Je lis et je réponds personnellement à chaque demande.</p>
              </div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 14, lineHeight: 1.4 }}>Tu fais déjà de la revente ? <span style={{ color: PINK }}>*</span></div>
              {["Oui, j'ai déjà une activité structurée", "Un peu, sans méthode", "Non, jamais"].map(opt => (
                <div key={opt} onClick={() => setRevente(opt)} style={{ border: `1px solid ${revente === opt ? PINK : "#2a2a2a"}`, borderRadius: 10, padding: "14px 16px", marginBottom: 10, cursor: "pointer", fontSize: 15, color: "#fff", background: revente === opt ? "rgba(255,45,120,0.08)" : "#161616", transition: "all 0.2s" }}>
                  {opt}
                </div>
              ))}
              <button onClick={() => revente && nextStep()} disabled={!revente} style={{ width: "100%", background: `linear-gradient(135deg, ${PINK}, #8A0048)`, color: "#fff", border: "none", padding: "16px", fontSize: 15, fontWeight: 700, borderRadius: 10, fontFamily: "inherit", marginTop: 10, cursor: revente ? "pointer" : "not-allowed", opacity: revente ? 1 : 0.35 }}>Continuer →</button>
            </div>
          )}

          {step === 4 && (
            <div>
              <button onClick={prevStep} style={{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", marginBottom: 14, padding: 0, fontFamily: "inherit" }}>← Retour</button>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 17, fontWeight: 700, color: "#fff", marginBottom: 14, lineHeight: 1.4 }}>Décris ta situation <span style={{ color: PINK }}>*</span></div>
              <textarea value={situation} onChange={e => setSituation(e.target.value)} placeholder="Ta situation actuelle, ce que tu recherches, tes objectifs..." style={{ width: "100%", background: "#161616", border: "1px solid #2a2a2a", color: "#fff", fontSize: 15, padding: "14px 16px", borderRadius: 10, marginBottom: 20, fontFamily: "inherit", minHeight: 110, resize: "vertical" }} />
              <button onClick={() => situation.trim().length >= 5 && nextStep()} disabled={situation.trim().length < 5} style={{ width: "100%", background: `linear-gradient(135deg, ${PINK}, #8A0048)`, color: "#fff", border: "none", padding: "16px", fontSize: 15, fontWeight: 700, borderRadius: 10, fontFamily: "inherit", cursor: situation.trim().length >= 5 ? "pointer" : "not-allowed", opacity: situation.trim().length >= 5 ? 1 : 0.35 }}>Continuer →</button>
            </div>
          )}

          {step === 5 && !sent && (
            <div>
              <button onClick={prevStep} style={{ background: "none", border: "none", color: "#666", fontSize: 13, cursor: "pointer", marginBottom: 14, padding: 0, fontFamily: "inherit" }}>← Retour</button>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 16, fontWeight: 700, color: "#fff", marginBottom: 18, lineHeight: 1.45 }}>L'accompagnement est un investissement de <span style={{ color: PINK }}>899€</span>. Tu es dans quelle situation ? <span style={{ color: PINK }}>*</span></div>
              {["Oui, je suis prêt à investir", "J'ai besoin d'en savoir plus avant de décider", "Non, pas maintenant"].map(opt => (
                <div key={opt} onClick={() => setInvestissement(opt)} style={{ border: `1px solid ${investissement === opt ? PINK : "#2a2a2a"}`, borderRadius: 10, padding: "14px 16px", marginBottom: 10, cursor: "pointer", fontSize: 15, color: "#fff", background: investissement === opt ? "rgba(255,45,120,0.08)" : "#161616", transition: "all 0.2s" }}>
                  {opt}
                </div>
              ))}
              <button onClick={sendToSheet} disabled={!investissement} style={{ width: "100%", marginTop: 12, background: `linear-gradient(135deg, ${PINK}, #8A0048)`, color: "#fff", border: "none", padding: "18px", fontSize: 16.5, fontWeight: 700, borderRadius: 12, fontFamily: "inherit", cursor: investissement ? "pointer" : "not-allowed", opacity: investissement ? 1 : 0.35, animation: investissement ? "glow 2s infinite" : "none" }}>
                Envoyer ma demande
              </button>
            </div>
          )}

          {sent && (
            <div style={{ textAlign: "center", padding: "18px 0" }}>
              <div style={{ width: 56, height: 56, borderRadius: "50%", background: `linear-gradient(135deg, ${PINK}, #8A0048)`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", fontSize: 28, color: "#fff" }}>✓</div>
              <div style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 20, fontWeight: 700, color: "#fff", marginBottom: 12 }}>Demande envoyée</div>
              <p style={{ fontSize: 14.5, color: "#c8c8c8", lineHeight: 1.65 }}>Merci {prenomAge.split(/[ ,]/)[0]}. J'étudie ton profil personnellement et je te recontacte au numéro que tu m'as laissé.</p>
              <p style={{ fontSize: 13, color: "#666", lineHeight: 1.6, marginTop: 14 }}>En attendant, tu peux suivre le quotidien juste en dessous 👇</p>
            </div>
          )}

        </div>
      </div>

      {/* ── RÉASSURANCE ── */}
      <div style={{ padding: "30px 20px 0" }}>
        <div style={{ background: "#0c0c0d", border: `1px solid ${BORDER}`, borderRadius: 16, padding: "22px" }}>
          {[
            ["Réponse personnelle.", "Je lis chaque demande et je te réponds moi-même."],
            ["Sélection manuelle.", "Un nombre limité de profils accepté chaque mois."],
            ["Une vraie activité derrière.", "Pas de théorie — du concret, tous les jours."],
            ["Basé sur des données réelles.", "Plus d'un an de ventes analysées."],
          ].map(([t, d], i) => (
            <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start", marginBottom: i < 3 ? 16 : 0, fontSize: 13.5, color: "#c8c8c8", lineHeight: 1.5 }}>
              <span style={{ color: PINK, fontWeight: 800, flexShrink: 0 }}>✓</span>
              <span><b style={{ color: "#fff" }}>{t}</b> {d}</span>
            </div>
          ))}
        </div>
      </div>

      {/* ── FOOTER ── */}
      <div style={{ padding: "34px 20px 48px", textAlign: "center" }}>
        <div style={{ display: "flex", justifyContent: "center", gap: 14, marginBottom: 24 }}>
          {[
            { label: "TikTok", icon: "🎵", href: LINKS.tiktok },
            { label: "Instagram", icon: "📸", href: LINKS.instagram },
          ].map(sm => (
            <a key={sm.label} href={sm.href} target="_blank" rel="noopener noreferrer" style={{ display: "flex", alignItems: "center", gap: 8, background: "#111", border: `1px solid ${BORDER}`, borderRadius: 10, padding: "10px 20px", color: "#777", fontSize: 13, fontWeight: 500, textDecoration: "none" }}>
              <span>{sm.icon}</span> {sm.label}
            </a>
          ))}
        </div>
        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: PINK, letterSpacing: "0.12em" }}>© MEIDA SKOOL</div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<MeidaResell />);
  </script>
</body>
</html>
